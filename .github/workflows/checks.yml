name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
      - name: Enable Corepack
        run: corepack enable
      - name: Install main deps
        run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn lint
      - name: TypeScript (client)
        run: yarn workspace client typecheck
      - name: Test
        run: yarn test

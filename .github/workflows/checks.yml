name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
      - name: Enable Corepack
        run: corepack enable
      - name: Install main deps
        run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn lint
      - name: TypeScript (client)
        run: yarn workspace client typecheck
      - name: Build (server)
        run: yarn workspace server build
      - name: Test (client)
        run: yarn workspace client test
      - name: Test (server)
        run: yarn workspace server test
      - name: Build client (GitHub Pages smoke)
        env:
          GITHUB_PAGES_BASE_URL: /42-gamedev-teamwork/
          VITE_STATIC_DEPLOY: gh-pages
          VITE_YANDEX_OAUTH_REDIRECT_URI: https://example.github.io/42-gamedev-teamwork
        run: cd packages/client && yarn build:client

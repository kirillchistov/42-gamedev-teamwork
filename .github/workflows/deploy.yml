# CD: деплой на ВМ в Яндекс.Облако после успешной сборки образов.
# Ветка автодеплоя: Variables → DEPLOY_BRANCH (или main по умолчанию).
# Ручной запуск: input deploy_branch переопределяет проверку ветки (только workflow_dispatch).
# Секреты: YC_VM_HOST, YC_VM_USER, YC_VM_SSH_KEY; опционально GHCR_TOKEN, GHCR_USER.
# См. docs/autodeploy-action.md

name: Deploy to Yandex Cloud VM

on:
  workflow_run:
    workflows: ['Build and push Docker images']
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: 'Ветка для проверки (пусто — Variables DEPLOY_BRANCH или main). Только при ручном запуске не блокирует деплой.'
        required: false
        type: string
        default: ''
      image_tag:
        description: 'Git SHA для тега образов (по умолчанию — текущий commit)'
        required: false
        type: string

env:
  DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH || 'main' }}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # В job.if нельзя использовать env — только vars / github / inputs
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == (vars.DEPLOY_BRANCH || 'main'))
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout (скрипт деплоя)
        uses: actions/checkout@v4

      - name: Resolve deploy branch (log)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.deploy_branch }}" ]; then
            echo "Manual deploy_branch input: ${{ inputs.deploy_branch }}"
          fi
          echo "Configured DEPLOY_BRANCH (Variables or default): ${{ env.DEPLOY_BRANCH }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Triggered by build on branch: ${{ github.event.workflow_run.head_branch }}"
          fi

      - name: Lowercase owner for GHCR
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Resolve image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.image_tag }}"
            if [ -z "$TAG" ]; then
              TAG="${{ github.sha }}"
            fi
          else
            TAG="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "Deploying tag: $TAG"

      - name: Set image URLs
        run: |
          REPO="${{ github.event.repository.name }}"
          echo "CLIENT_IMAGE=ghcr.io/${{ env.OWNER_LC }}/${REPO}/client:${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "SERVER_IMAGE=ghcr.io/${{ env.OWNER_LC }}/${REPO}/server:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Set deploy path
        run: |
          if [ -n "${{ secrets.YC_DEPLOY_PATH }}" ]; then
            echo "DEPLOY_PATH=${{ secrets.YC_DEPLOY_PATH }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_PATH=/opt/cosmic-match" >> "$GITHUB_ENV"
          fi

      - name: Verify deploy secrets
        run: |
          if [ -z "${{ secrets.YC_VM_HOST }}" ]; then
            echo "::error::Добавьте secret YC_VM_HOST (IP ВМ) в Settings → Secrets → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.YC_VM_USER }}" ]; then
            echo "::error::Добавьте secret YC_VM_USER"
            exit 1
          fi
          if [ -z "${{ secrets.YC_VM_SSH_KEY }}" ]; then
            echo "::error::Добавьте secret YC_VM_SSH_KEY (приватный SSH-ключ)"
            exit 1
          fi

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.YC_VM_HOST }}
          username: ${{ secrets.YC_VM_USER }}
          key: ${{ secrets.YC_VM_SSH_KEY }}
          script_stop: true
          script: |
            mkdir -p "${{ env.DEPLOY_PATH }}/scripts" "${{ env.DEPLOY_PATH }}/deploy/nginx/certs"

      - name: Sync deploy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.YC_VM_HOST }}
          username: ${{ secrets.YC_VM_USER }}
          key: ${{ secrets.YC_VM_SSH_KEY }}
          source: 'docker-compose.prod.yml,scripts/deploy-on-vm.sh,scripts/sync-postgres-password.sh,deploy/nginx'
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          CLIENT_IMAGE: ${{ env.CLIENT_IMAGE }}
          SERVER_IMAGE: ${{ env.SERVER_IMAGE }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER || github.repository_owner }}
        with:
          host: ${{ secrets.YC_VM_HOST }}
          username: ${{ secrets.YC_VM_USER }}
          key: ${{ secrets.YC_VM_SSH_KEY }}
          envs: CLIENT_IMAGE,SERVER_IMAGE,DEPLOY_PATH,GHCR_TOKEN,GHCR_USER
          script_stop: true
          script: |
            chmod +x "$DEPLOY_PATH/scripts/deploy-on-vm.sh"
            bash "$DEPLOY_PATH/scripts/deploy-on-vm.sh"

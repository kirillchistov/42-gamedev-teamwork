name: Deploy client to GitHub Pages

on:
  push:
    branches:
      - main
      - dev
      - sprint_7
      - sprint_8
      - feature/8.10-demo
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build client
        env:
          GITHUB_PAGES_BASE_URL: /${{ github.event.repository.name }}/
          # Статика без SSR-прокси: auth/leaderboard → ya-praktikum.tech (CORS + cookie)
          VITE_STATIC_DEPLOY: gh-pages
          VITE_YANDEX_OAUTH_REDIRECT_URI: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: cd packages/client && yarn build

      - name: SPA fallback for deep links
        run: cp packages/client/dist/client/index.html packages/client/dist/client/404.html

      - name: Disable Jekyll
        run: touch packages/client/dist/client/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
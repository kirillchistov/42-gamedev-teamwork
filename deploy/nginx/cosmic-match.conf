# Прод: reverse-proxy HTTPS + HTTP/2 → SSR client (Cosmic Match, задача 9.2).
# Установка: /etc/nginx/sites-available/ + symlink sites-enabled
# или include из основного nginx.conf.
# Перед применением: замените server_name и пути к сертификатам Let's Encrypt.

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name match.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name match.example.com;

    ssl_certificate     /etc/letsencrypt/live/match.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/match.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000" always;

    access_log /var/log/nginx/cosmic-match.access.log;
    error_log  /var/log/nginx/cosmic-match.error.log warn;

    client_max_body_size 10m;

    location = /ping {
        default_type application/json;
        return 200 '{"status":"ok","service":"cosmic-match"}';
    }

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}

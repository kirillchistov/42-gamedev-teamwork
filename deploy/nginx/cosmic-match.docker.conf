# Локальная проверка: nginx в Docker → сервис client:80 (docker compose).
# Сертификаты: deploy/nginx/certs/ (см. scripts/verify-nginx-local.sh).

server {
    listen 80;
    server_name localhost;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    resolver 127.0.0.11 valid=30s ipv6=off;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10m;

    location = /ping {
        default_type application/json;
        return 200 '{"status":"ok","service":"cosmic-match","env":"docker"}';
    }

    location / {
        set $client_upstream client;
        proxy_pass http://$client_upstream:80;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}

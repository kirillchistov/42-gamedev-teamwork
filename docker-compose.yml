# Клиент (SSR), API, PostgreSQL и nginx (HTTPS + HTTP/2) в одной сети Docker.
# Точка входа снаружи: https://localhost:${NGINX_HTTPS_PORT:-18443} (нужны сертификаты в deploy/nginx/certs/).
# Прямой SSR без nginx: http://localhost:${CLIENT_PORT:-9000}
# Первый запуск nginx: ./scripts/verify-nginx-local.sh (шаг 1) или см. deploy/nginx/certs/README.md

services:
  postgres:
    image: postgres:16-alpine
    container_name: cosmic-match-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    # На macOS :5432 часто занят Homebrew Postgres — с хоста подключаемся к 5433 (см. .env.sample).
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    container_name: cosmic-match-migrate
    image: cosmic-match-server
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        SERVER_PORT: ${SERVER_PORT:-3000}
    restart: "no"
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    command: ["/app/packages/server/scripts/docker-migrate.sh"]
    depends_on:
      postgres:
        condition: service_healthy

  server:
    container_name: cosmic-match-server
    image: cosmic-match-server
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        SERVER_PORT: ${SERVER_PORT:-3000}
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    environment:
      NODE_ENV: production
      SERVER_PORT: ${SERVER_PORT:-3000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      FORUM_MODERATOR_PRAKTIKUM_IDS: ${FORUM_MODERATOR_PRAKTIKUM_IDS:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:' + (process.env.SERVER_PORT || 3000) + '/health', response => process.exit(response.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  client:
    container_name: cosmic-match-client
    image: cosmic-match-client
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped
    ports:
      # На хосте не занимать тот же порт, что у API (по умолчанию 3000 у server).
      - "${CLIENT_PORT:-9000}:80"
    environment:
      NODE_ENV: production
      PORT: "80"
      INTERNAL_SERVER_URL: http://server:${SERVER_PORT:-3000}
      PRAKTIKUM_API_URL: ${PRAKTIKUM_API_URL:-https://ya-praktikum.tech}
      # SSR в контейнере: entry-server ходит на server:PORT, не на localhost:3000
      EXTERNAL_SERVER_URL: http://server:${SERVER_PORT:-3000}
    depends_on:
      server:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: cosmic-match-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-18080}:80"
      - "${NGINX_HTTPS_PORT:-18443}:443"
    volumes:
      - ./deploy/nginx/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/cosmic-match.docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/ssl:ro
    depends_on:
      client:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1/ping || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pgdata:

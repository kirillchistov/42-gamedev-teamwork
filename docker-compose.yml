# Клиент (SSR), сервер Node и PostgreSQL в одной сети Docker.
# Сделал .env, надо проверить порты/пароли.

services:
  postgres:
    image: postgres:16-alpine
    container_name: cosmic-match-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    container_name: cosmic-match-server
    image: cosmic-match-server
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        SERVER_PORT: ${SERVER_PORT:-3001}
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3001}:${SERVER_PORT:-3001}"
    environment:
      NODE_ENV: production
      SERVER_PORT: ${SERVER_PORT:-3001}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

  client:
    container_name: cosmic-match-client
    image: cosmic-match-client
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3000}:80"
    environment:
      NODE_ENV: production
      PORT: "80"
    depends_on:
      - server

volumes:
  pgdata:

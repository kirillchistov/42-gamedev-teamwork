# Клиент (SSR), сервер Node и PostgreSQL в одной сети Docker.
# Сделал .env, надо проверить порты/пароли.

services:
  postgres:
    image: postgres:16-alpine
    container_name: cosmic-match-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    # На macOS :5432 часто занят Homebrew Postgres — с хоста подключаемся к 5433 (см. .env.sample).
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    container_name: cosmic-match-server
    image: cosmic-match-server
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        SERVER_PORT: ${SERVER_PORT:-3000}
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    environment:
      NODE_ENV: production
      SERVER_PORT: ${SERVER_PORT:-3000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

  client:
    container_name: cosmic-match-client
    image: cosmic-match-client
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped
    ports:
      # На хосте не занимать тот же порт, что у API (по умолчанию 3000 у server).
      - "${CLIENT_PORT:-5173}:80"
    environment:
      NODE_ENV: production
      PORT: "80"
      INTERNAL_SERVER_URL: http://server:${SERVER_PORT:-3000}
      PRAKTIKUM_API_URL: ${PRAKTIKUM_API_URL:-https://ya-praktikum.tech}
    depends_on:
      - server

volumes:
  pgdata:

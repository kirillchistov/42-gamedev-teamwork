<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" role="img" aria-labelledby="title desc">
  <title id="title">Canvas render pipeline</title>
  <desc id="desc">Animated two-layer rendering flow for board canvas and FX canvas with requestAnimationFrame loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .box{fill:#334155;stroke:#94a3b8;stroke-width:1.5;rx:8;animation:glow 8s ease-in-out infinite}
      .lbl{fill:#f1f5f9;font:600 13px system-ui,sans-serif}
      .sub{fill:#cbd5e1;font:10px ui-monospace,monospace}
      .arr{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#m);animation:line 8s ease-in-out infinite}
      @keyframes glow{0%,1.6%{stroke:#38bdf8;stroke-width:2.5;fill:#1e3a5f;filter:url(#glow)}3%,100%{stroke:#94a3b8;stroke-width:1.5;fill:#334155;filter:none}}
      @keyframes line{0%,1.6%{stroke:#38bdf8;stroke-width:2.5}3%,100%{stroke:#475569;stroke-width:2}}
      #b1,#l1{animation-delay:0s}#b2,#l2{animation-delay:1s}#b3,#l3{animation-delay:2s}#b4,#l4{animation-delay:3s}
      #b5,#l5{animation-delay:4s}#b6,#l6{animation-delay:5s}#b7,#l7{animation-delay:6s}#b8{animation-delay:7s}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><polygon points="0 0,8 4,0 8" fill="#64748b"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <text x="460" y="34" text-anchor="middle" class="lbl" font-size="16">Rendering layers: game canvas + React overlays</text>
  <text x="460" y="52" text-anchor="middle" class="sub">Game canvas has board + fx; React overlays are composited above them</text>

  <rect id="b1" x="40" y="88" width="200" height="58" class="box"/><text x="140" y="116" class="lbl" text-anchor="middle">State snapshot</text><text x="140" y="132" class="sub" text-anchor="middle">grid + animation frames</text>
  <path id="l1" class="arr" d="M 240 117 L 300 117"/>
  <rect id="b2" x="300" y="88" width="230" height="58" class="box"/><text x="415" y="116" class="lbl" text-anchor="middle">renderer.renderBoard()</text><text x="415" y="132" class="sub" text-anchor="middle">board-canvas clear + draw</text>
  <path id="l2" class="arr" d="M 530 117 L 592 117"/>
  <rect id="b3" x="592" y="88" width="288" height="58" class="box"/><text x="736" y="116" class="lbl" text-anchor="middle">draw cells, tiles, blockers, highlights</text><text x="736" y="132" class="sub" text-anchor="middle">icons/theme fallback to shapes</text>

  <path id="l3" class="arr" d="M 415 146 L 415 196"/>
  <rect id="b4" x="250" y="196" width="330" height="58" class="box"/><text x="415" y="224" class="lbl" text-anchor="middle">requestAnimationFrame board loop</text><text x="415" y="240" class="sub" text-anchor="middle">while game is active</text>
  <path id="l4" class="arr" d="M 580 225 L 660 225"/>
  <rect id="b5" x="660" y="196" width="230" height="58" class="box"/><text x="775" y="224" class="lbl" text-anchor="middle">matchFx update</text><text x="775" y="240" class="sub" text-anchor="middle">particles + premium combos</text>

  <path id="l5" class="arr" d="M 775 254 L 775 306"/>
  <rect id="b6" x="620" y="306" width="270" height="58" class="box"/><text x="755" y="334" class="lbl" text-anchor="middle">fx-canvas draw</text><text x="755" y="350" class="sub" text-anchor="middle">separate layer over board</text>
  <path id="l6" class="arr" d="M 620 335 L 516 335"/>
  <rect id="b7" x="278" y="306" width="238" height="58" class="box"/><text x="397" y="334" class="lbl" text-anchor="middle">compose on screen</text><text x="397" y="350" class="sub" text-anchor="middle">game canvas + React overlay layer</text>
  <path id="l7" class="arr" d="M 278 335 L 196 335"/>
  <rect id="b8" x="40" y="306" width="156" height="58" class="box"/><text x="118" y="334" class="lbl" text-anchor="middle">next frame</text><text x="118" y="350" class="sub" text-anchor="middle">loop</text>

  <text x="32" y="460" class="sub">Visual model: game canvas (board + fx) plus React DOM overlays for HUD and modals.</text>
  <text x="32" y="476" class="sub">Key files: renderer.ts, matchFx.ts, Match3Screen.tsx, GamePage.tsx, game-visuals.md</text>
</svg>

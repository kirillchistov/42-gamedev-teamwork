<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">Client: which modules call which host</title>
  <desc id="desc">BASE_URL is Praktikum API; SERVER_HOST is our Node server from VITE_APP_API_URL.</desc>
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1220"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <style>
      .col{fill:#0f172a;stroke:#475569;stroke-width:1;rx:12}
      .row{fill:#334155;stroke:#64748b;stroke-width:1.2;rx:8}
      .h{fill:#38bdf8;font:700 13px system-ui,sans-serif}
      .t{fill:#f8fafc;font:600 12px system-ui,sans-serif}
      .m{fill:#cbd5e1;font:10.5px ui-monospace,monospace}
    </style>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg2)"/>
  <text x="400" y="32" text-anchor="middle" fill="#f8fafc" font="700 16px system-ui,sans-serif">Client: two base URLs</text>
  <text x="400" y="52" text-anchor="middle" class="m">packages/client/src/constants.tsx</text>

  <rect x="24" y="72" width="360" height="300" class="col"/>
  <text x="204" y="98" text-anchor="middle" class="h">BASE_URL to Praktikum</text>
  <text x="204" y="116" text-anchor="middle" class="m">ya-praktikum.tech/api/v2</text>

  <rect x="40" y="128" width="328" height="44" class="row"/>
  <text x="56" y="150" class="t">apiClient.ts, userApi</text>
  <text x="56" y="164" class="m">profile, logout, multipart avatar</text>

  <rect x="40" y="182" width="328" height="44" class="row"/>
  <text x="56" y="204" class="t">userSlice.ts</text>
  <text x="56" y="218" class="m">signin / signup (fetch to BASE_URL)</text>

  <rect x="40" y="236" width="328" height="44" class="row"/>
  <text x="56" y="258" class="t">oauthApi.ts</text>
  <text x="56" y="272" class="m">Yandex OAuth</text>

  <rect x="40" y="290" width="328" height="44" class="row"/>
  <text x="56" y="312" class="t">leaderboardApi.ts</text>
  <text x="56" y="326" class="m">GET /leaderboard</text>

  <rect x="416" y="72" width="360" height="220" class="col"/>
  <text x="596" y="98" text-anchor="middle" class="h">SERVER_HOST to our Node</text>
  <text x="596" y="116" text-anchor="middle" class="m">process.env.VITE_APP_API_URL (vite define)</text>

  <rect x="432" y="128" width="328" height="44" class="row"/>
  <text x="448" y="150" class="t">forumApi.ts</text>
  <text x="448" y="164" class="m">POST GET PATCH /api/forum + credentials</text>

  <rect x="432" y="182" width="328" height="44" class="row"/>
  <text x="448" y="204" class="t">friendsSlice.ts</text>
  <text x="448" y="218" class="m">GET /friends</text>

  <rect x="416" y="308" width="360" height="64" class="col"/>
  <text x="596" y="334" text-anchor="middle" class="h">Avatar resources</text>
  <text x="596" y="354" text-anchor="middle" class="m">API_RESOURCES_URL = BASE_URL + /resources</text>

  <text x="400" y="392" text-anchor="middle" class="m">SSR Express does not proxy these; browser calls both hosts (different origins in dev).</text>
</svg>

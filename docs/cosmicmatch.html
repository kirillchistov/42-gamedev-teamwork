                const orb = document.createElementNS("http://www.w3.org/2000/svg","circle"); orb.setAttribute("cx","50"); orb.setAttribute("cy","50"); orb.setAttribute("r","24"); orb.setAttribute("fill",mainColor);
                mainGroup.appendChild(orb);
                for(let i=0;i<3;i++){ let arc=document.createElementNS("http://www.w3.org/2000/svg","circle"); arc.setAttribute("cx",45+i*5); arc.setAttribute("cy",45+i*3); arc.setAttribute("r","3"); arc.setAttribute("fill","white"); mainGroup.appendChild(arc);}
            } else if (shapeIndex === 4) { // DARK MATTER: irregular blob
                const blob = document.createElementNS("http://www.w3.org/2000/svg","path");
                blob.setAttribute("d","M35,40 Q45,30 60,35 Q70,45 65,60 Q58,72 42,68 Q30,62 35,40 Z");
                blob.setAttribute("fill",mainColor); mainGroup.appendChild(blob);
            } else if (shapeIndex === 5) { // QUASAR EYE
                const eyeShape = document.createElementNS("http://www.w3.org/2000/svg","ellipse"); eyeShape.setAttribute("cx","50"); eyeShape.setAttribute("cy","50"); eyeShape.setAttribute("rx","20"); eyeShape.setAttribute("ry","14"); eyeShape.setAttribute("fill",mainColor);
                mainGroup.appendChild(eyeShape);
                const pupil=document.createElementNS("http://www.w3.org/2000/svg","circle"); pupil.setAttribute("cx","50"); pupil.setAttribute("cy","50"); pupil.setAttribute("r","6"); pupil.setAttribute("fill","black");
                mainGroup.appendChild(pupil);
            } else if (shapeIndex === 6) { // SOLAR FLARE: rays
                const rays = document.createElementNS("http://www.w3.org/2000/svg","polygon");
                rays.setAttribute("points","50,20 54,40 70,42 58,52 64,70 50,60 36,70 42,52 30,42 46,40 Z");
                rays.setAttribute("fill",accentColor); mainGroup.appendChild(rays);
            } else if (shapeIndex === 7) { // ION RING
                const ring = document.createElementNS("http://www.w3.org/2000/svg","circle"); ring.setAttribute("cx","50"); ring.setAttribute("cy","50"); ring.setAttribute("r","25"); ring.setAttribute("fill","none"); ring.setAttribute("stroke",accentColor); ring.setAttribute("stroke-width","4");
                mainGroup.appendChild(ring);
                const dot=document.createElementNS("http://www.w3.org/2000/svg","circle"); dot.setAttribute("cx","50"); dot.setAttribute("cy","50"); dot.setAttribute("r","8"); dot.setAttribute("fill",mainColor);
                mainGroup.appendChild(dot);
            } else if (shapeIndex === 8) { // GRAVITY WELL
                const well = document.createElementNS("http://www.w3.org/2000/svg","path");
                well.setAttribute("d","M 35,55 Q 50,40 65,55 Q 50,70 35,55 Z"); well.setAttribute("fill",mainColor);
                mainGroup.appendChild(well);
            } else if (shapeIndex === 9) { // STARSEED: star with 6 points
                const star6 = document.createElementNS("http://www.w3.org/2000/svg","polygon");
                star6.setAttribute("points","50,20 58,44 84,44 64,58 72,84 50,68 28,84 36,58 16,44 42,44"); star6.setAttribute("fill",mainColor);
                mainGroup.appendChild(star6);
            } else if (shapeIndex === 10) { // PULSAR BEACON
                const beacon = document.createElementNS("http://www.w3.org/2000/svg","rect"); beacon.setAttribute("x","40"); beacon.setAttribute("y","35"); beacon.setAttribute("width","20"); beacon.setAttribute("height","30"); beacon.setAttribute("fill",mainColor);
                mainGroup.appendChild(beacon);
                const topLight=document.createElementNS("http://www.w3.org/2000/svg","circle"); topLight.setAttribute("cx","50"); topLight.setAttribute("cy","32"); topLight.setAttribute("r","4"); topLight.setAttribute("fill","#ffaa55");
                mainGroup.appendChild(topLight);
            } else if (shapeIndex === 11) { // HYPERDRIVE
                const engine = document.createElementNS("http://www.w3.org/2000/svg","polygon");
                engine.setAttribute("points","50,25 70,50 50,75 30,50"); engine.setAttribute("fill",mainColor);
                mainGroup.appendChild(engine);
            } else if (shapeIndex === 12) { // VOID PORTAL
                const portal = document.createElementNS("http://www.w3.org/2000/svg","circle"); portal.setAttribute("cx","50"); portal.setAttribute("cy","50"); portal.setAttribute("r","20"); portal.setAttribute("fill","black"); portal.setAttribute("stroke",accentColor);
                mainGroup.appendChild(portal);
            } else if (shapeIndex === 13) { // ENERGY TORUS
                const torus = document.createElementNS("http://www.w3.org/2000/svg","ellipse"); torus.setAttribute("cx","50"); torus.setAttribute("cy","50"); torus.setAttribute("rx","28"); torus.setAttribute("ry","14"); torus.setAttribute("fill","none"); torus.setAttribute("stroke",accentColor); torus.setAttribute("stroke-width","3");
                mainGroup.appendChild(torus);
            } else if (shapeIndex === 14) { // COSMIC EGG
                const egg = document.createElementNS("http://www.w3.org/2000/svg","ellipse"); egg.setAttribute("cx","50"); egg.setAttribute("cy","52"); egg.setAttribute("rx","18"); egg.setAttribute("ry","25"); egg.setAttribute("fill",mainColor);
                mainGroup.appendChild(egg);
            } else if (shapeIndex === 15) { // METEOR HAMMER
                const hammer = document.createElementNS("http://www.w3.org/2000/svg","rect"); hammer.setAttribute("x","35"); hammer.setAttribute("y","45"); hammer.setAttribute("width","30"); hammer.setAttribute("height","12"); hammer.setAttribute("fill","#a56b3a");
                mainGroup.appendChild(hammer);
                const spike=document.createElementNS("http://www.w3.org/2000/svg","polygon"); spike.setAttribute("points","65,51 75,51 70,45"); spike.setAttribute("fill","#a56b3a"); mainGroup.appendChild(spike);
            } else if (shapeIndex === 16) { // STARFISH NEBULA
                const starfish = document.createElementNS("http://www.w3.org/2000/svg","polygon");
                starfish.setAttribute("points","50,30 60,48 80,48 64,62 72,82 50,70 28,82 36,62 20,48 40,48 Z"); starfish.setAttribute("fill",mainColor);
                mainGroup.appendChild(starfish);
            } else if (shapeIndex === 17) { // TIME CRYSTAL
                const crystal = document.createElementNS("http://www.w3.org/2000/svg","polygon");
                crystal.setAttribute("points","50,20 70,40 50,80 30,40"); crystal.setAttribute("fill",mainColor);
                mainGroup.appendChild(crystal);
            } else if (shapeIndex === 18) { // ANTIMATTER BOLT
                const bolt = document.createElementNS("http://www.w3.org/2000/svg","polygon");
                bolt.setAttribute("points","50,20 60,45 54,48 64,70 46,52 50,45 40,35"); bolt.setAttribute("fill","#ff44aa");
                mainGroup.appendChild(bolt);
            } else if (shapeIndex === 19) { // NOVA BURST
                const burstShape = document.createElementNS("http://www.w3.org/2000/svg","circle"); burstShape.setAttribute("cx","50"); burstShape.setAttribute("cy","50"); burstShape.setAttribute("r","20"); burstShape.setAttribute("fill",mainColor);
                mainGroup.appendChild(burstShape);
                for(let s=0;s<8;s++){ let ray=document.createElementNS("http://www.w3.org/2000/svg","line"); ray.setAttribute("x1","50"); ray.setAttribute("y1","50"); let ang=s*45*Math.PI/180; let x2=50+Math.cos(ang)*35; let y2=50+Math.sin(ang)*35; ray.setAttribute("x2",x2); ray.setAttribute("y2",y2); ray.setAttribute("stroke","orange"); ray.setAttribute("stroke-width","2"); mainGroup.appendChild(ray);}
            } else {
                // fallback for remaining shapes (20 more) - generate an abstract geometry
                const polyPoints = [];
                for(let p=0;p<6;p++){ let angle = p*60 + (shapeSeed%20); let rad=angle*Math.PI/180; let x=50+Math.cos(rad)*28; let y=50+Math.sin(rad)*28; polyPoints.push(x+","+y); }
                const abstractPoly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
                abstractPoly.setAttribute("points", polyPoints.join(" ")); abstractPoly.setAttribute("fill", mainColor);
                mainGroup.appendChild(abstractPoly);
            }
        }
        
        svgElement.appendChild(mainGroup);
        
        // ---- UNIVERSAL DECORATIONS: floating particles, neon rings (all items get unique extras) ----
        const extraGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
        for (let s = 0; s < (idx % 4) + 2; s++) {
            const ang = (s * 97 + idx * 23) % 360;
            const radAng = ang * Math.PI / 180;
            const radX = 50 + Math.cos(radAng) * 38;
            const radY = 50 + Math.sin(radAng) * 38;
            const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            dot.setAttribute("cx", radX); dot.setAttribute("cy", radY); dot.setAttribute("r", "2");
            dot.setAttribute("fill", `hsl(${(hue + s * 45) % 360}, 90%, 70%)`); dot.setAttribute("opacity", "0.8");
            extraGroup.appendChild(dot);
        }
        // inner glow
        const flashCore = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        flashCore.setAttribute("cx", "50"); flashCore.setAttribute("cy", "48"); flashCore.setAttribute("r", "12");
        flashCore.setAttribute("fill", "url(#starGlowGrad)"); flashCore.setAttribute("opacity", "0.4");
        extraGroup.appendChild(flashCore);
        // outer dash ring
        const ringOutline = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        ringOutline.setAttribute("cx", "50"); ringOutline.setAttribute("cy", "50"); ringOutline.setAttribute("r", "41");
        ringOutline.setAttribute("fill", "none"); ringOutline.setAttribute("stroke", accentColor);
        ringOutline.setAttribute("stroke-width", "1.2"); ringOutline.setAttribute("stroke-dasharray", "3 3"); ringOutline.setAttribute("opacity", "0.6");
        extraGroup.appendChild(ringOutline);
        svgElement.appendChild(extraGroup);
    }
    
    // RENDER FULL GALLERY
    function renderGallery() {
        const gridContainer = document.getElementById("galleryGrid");
        gridContainer.innerHTML = "";
        objectsCatalog.forEach((obj, idx) => {
            const card = document.createElement("div");
            card.className = "card";
            const svgWrapper = document.createElement("div");
            svgWrapper.className = "svg-container";
            const svgNS = "http://www.w3.org/2000/svg";
            const svgElem = document.createElementNS(svgNS, "svg");
            svgElem.setAttribute("viewBox", "0 0 100 100");
            svgElem.setAttribute("width", "90");
            svgElem.setAttribute("height", "90");
            drawObject(svgElem, obj, idx);
            svgWrapper.appendChild(svgElem);
            const nameSpan = document.createElement("div");
            nameSpan.className = "object-name";
            nameSpan.innerText = obj.name;
            const catSpan = document.createElement("div");
            catSpan.className = "object-cat";
            catSpan.innerText = obj.category.startsWith("custom_") ? "COSMIC SHAPE" : obj.category.toUpperCase();
            card.appendChild(svgWrapper);
            card.appendChild(nameSpan);
            card.appendChild(catSpan);
            gridContainer.appendChild(card);
        });
        document.getElementById("totalCountDisplay").innerHTML = `✨ TOTAL: ${objectsCatalog.length} UNIQUE COSMIC COLLECTIBLES ✨`;
    }
    
    window.addEventListener("DOMContentLoaded", () => {
        renderGallery();
    });
</script>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">HTTP: browser, SSR, our API, Praktikum</title>
  <desc id="desc">Browser gets SSR from packages/client server, calls Praktikum API and packages/server Express; server checks session and uses Postgres for forum.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1220"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .box{fill:#334155;stroke:#64748b;stroke-width:1.5;rx:10}
      .boxHi{fill:#1e3a5f;stroke:#38bdf8;stroke-width:1.8;rx:10}
      .grp{fill:#0f172a;stroke:#475569;stroke-width:1;rx:12}
      .t{fill:#f8fafc;font:600 14px system-ui,sans-serif}
      .s{fill:#cbd5e1;font:11px ui-monospace,monospace}
      .edge{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .edgeHi{stroke:#38bdf8;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .cap{fill:#fbbf24;font:600 11px system-ui,sans-serif}
    </style>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <text x="480" y="36" text-anchor="middle" class="t" font-size="18">HTTP layers: who talks to whom</text>
  <text x="480" y="58" text-anchor="middle" class="s">Same Praktikum session cookie to ya-praktikum.tech and to our Node API</text>

  <rect x="360" y="88" width="240" height="56" class="boxHi"/>
  <text x="480" y="118" text-anchor="middle" class="t">Browser</text>
  <text x="480" y="134" text-anchor="middle" class="s">React SPA after first load</text>

  <rect x="40" y="200" width="280" height="120" class="grp"/>
  <text x="56" y="222" class="s">packages/client/server</text>
  <rect x="56" y="232" width="248" height="76" class="box"/>
  <text x="180" y="258" text-anchor="middle" class="t">SSR Express + Vite</text>
  <text x="180" y="278" text-anchor="middle" class="s">HTML, APP_INITIAL_STATE</text>
  <text x="180" y="296" text-anchor="middle" class="s">CLIENT_PORT / PORT</text>

  <rect x="340" y="200" width="280" height="120" class="grp"/>
  <text x="356" y="222" class="s">packages/server (createApp)</text>
  <rect x="356" y="232" width="248" height="76" class="box"/>
  <text x="480" y="258" text-anchor="middle" class="t">Node API</text>
  <text x="480" y="278" text-anchor="middle" class="s">/api/forum /friends /user</text>
  <text x="480" y="296" text-anchor="middle" class="s">SERVER_PORT default 3000</text>

  <rect x="640" y="200" width="280" height="120" class="grp"/>
  <text x="656" y="222" class="s">Praktikum (external)</text>
  <rect x="656" y="232" width="248" height="76" class="box"/>
  <text x="780" y="258" text-anchor="middle" class="t">ya-praktikum.tech/api/v2</text>
  <text x="780" y="278" text-anchor="middle" class="s">auth, profile, oauth, leaderboard</text>
  <text x="780" y="296" text-anchor="middle" class="s">GET /auth/user with Cookie</text>

  <rect x="380" y="400" width="200" height="64" class="box"/>
  <text x="480" y="430" text-anchor="middle" class="t">PostgreSQL</text>
  <text x="480" y="448" text-anchor="middle" class="s">forum: topics, comments, reactions</text>

  <path class="edgeHi" d="M 420 144 L 180 200"/>
  <text x="260" y="168" class="cap">first page</text>
  <path class="edgeHi" d="M 480 144 L 480 200"/>
  <text x="492" y="178" class="cap">fetch</text>
  <path class="edgeHi" d="M 540 144 L 780 200"/>
  <text x="700" y="168" class="cap">fetch</text>

  <path class="edge" d="M 604 276 L 656 276"/>
  <text x="630" y="268" class="s" text-anchor="middle">middleware</text>

  <path class="edge" d="M 480 320 L 480 400"/>

  <text x="480" y="528" text-anchor="middle" class="s">middleware: packages/server/middleware/requirePraktikumAuth.ts</text>
</svg>

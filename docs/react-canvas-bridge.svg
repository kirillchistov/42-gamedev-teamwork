<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" role="img" aria-labelledby="title desc">
  <title id="title">React and Canvas bridge</title>
  <desc id="desc">Animated map showing game canvas layers, React overlay layer, and their interaction via runtime callbacks.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .box{fill:#334155;stroke:#94a3b8;stroke-width:1.5;rx:8;animation:glow 8s ease-in-out infinite}
      .lbl{fill:#f1f5f9;font:600 13px system-ui,sans-serif}
      .sub{fill:#cbd5e1;font:10px ui-monospace,monospace}
      .arr{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#m);animation:line 8s ease-in-out infinite}
      .feedback{stroke:#f59e0b;stroke-dasharray:6 4}
      @keyframes glow{0%,1.6%{stroke:#38bdf8;stroke-width:2.5;fill:#1e3a5f;filter:url(#glow)}3%,100%{stroke:#94a3b8;stroke-width:1.5;fill:#334155;filter:none}}
      @keyframes line{0%,1.6%{stroke:#38bdf8;stroke-width:2.5}3%,100%{stroke:#475569;stroke-width:2}}
      #b1,#l1{animation-delay:0s}#b2,#l2{animation-delay:1s}#b3,#l3{animation-delay:2s}#b4,#l4{animation-delay:3s}
      #b5,#l5{animation-delay:4s}#b6,#l6{animation-delay:5s}#b7,#l7{animation-delay:6s}#b8{animation-delay:7s}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><polygon points="0 0,8 4,0 8" fill="#64748b"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <text x="460" y="34" text-anchor="middle" class="lbl" font-size="16">React ? Canvas API bridge</text>
  <text x="460" y="52" text-anchor="middle" class="sub">Game canvas layers are imperative; React overlays are declarative and sit above canvas</text>

  <rect id="b1" x="48" y="90" width="192" height="58" class="box"/><text x="144" y="118" class="lbl" text-anchor="middle">GamePage.tsx</text><text x="144" y="134" class="sub" text-anchor="middle">settings + route state</text>
  <path id="l1" class="arr" d="M 240 119 L 302 119"/>
  <rect id="b2" x="302" y="90" width="212" height="58" class="box"/><text x="408" y="118" class="lbl" text-anchor="middle">Match3Screen.tsx</text><text x="408" y="134" class="sub" text-anchor="middle">mount canvas refs</text>
  <path id="l2" class="arr" d="M 514 119 L 578 119"/>
  <rect id="b3" x="578" y="90" width="294" height="58" class="box"/><text x="725" y="118" class="lbl" text-anchor="middle">createMatch3Game(boardCanvas, fxCanvas)</text><text x="725" y="134" class="sub" text-anchor="middle">game canvas: board + fx layers</text>

  <path id="l3" class="arr" d="M 725 148 L 725 194"/>
  <rect id="b4" x="580" y="194" width="292" height="58" class="box"/><text x="726" y="222" class="lbl" text-anchor="middle">runtime controls from React</text><text x="726" y="238" class="sub" text-anchor="middle">setLevel/theme/vfx/startPlay/reset</text>
  <path id="l4" class="arr" d="M 580 223 L 516 223"/>
  <rect id="b5" x="292" y="194" width="224" height="58" class="box"/><text x="404" y="222" class="lbl" text-anchor="middle">engine loops</text><text x="404" y="238" class="sub" text-anchor="middle">board draw + fx draw + resolve</text>
  <path id="l5" class="arr" d="M 292 223 L 236 223"/>
  <rect id="b6" x="48" y="194" width="188" height="58" class="box"/><text x="142" y="222" class="lbl" text-anchor="middle">onHudChange()</text><text x="142" y="238" class="sub" text-anchor="middle">score/time/goals/combo</text>
  <path id="l6" class="arr feedback" d="M 142 252 L 142 306"/>
  <rect id="b7" x="48" y="306" width="256" height="64" class="box"/><text x="176" y="336" class="lbl" text-anchor="middle">React overlay layer (DOM)</text><text x="176" y="352" class="sub" text-anchor="middle">HUD, modals, result screen</text>
  <path id="l7" class="arr feedback" d="M 304 338 L 580 338 L 580 252"/>
  <rect id="b8" x="580" y="306" width="292" height="64" class="box"/><text x="726" y="336" class="lbl" text-anchor="middle">Composition on screen</text><text x="726" y="352" class="sub" text-anchor="middle">canvas behind, React overlays above</text>

  <text x="48" y="460" class="sub">Two visual layers: (1) game canvas = board + fx, (2) React overlay layer = HUD/modals/events.</text>
  <text x="48" y="478" class="sub">Contract boundary: React owns UX and route state; engine owns board simulation and frame rendering.</text>
</svg>
